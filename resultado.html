<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seu resultado — mamando bem?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Nunito:wght@400;500;600;700;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blush:#F6D7DD; --blush-claro:#FBE9EC; --rosa:#EE8DA8; --rosa-claro:#F7B7C6;
    --rosa-link:#E86A8E; --verde:#2F4A3D; --verde-hover:#38583f; --azul:#BFE1EC;
    --coral:#F5A38C; --lavanda:#ECE0EF; --grafite:#33302F; --cinza:#8A8A8A; --branco:#FFFFFF;
    --sombra:0 18px 45px -18px rgba(180,110,130,.45);
    --sombra-sm:0 8px 22px -10px rgba(180,110,130,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;color:var(--grafite);
    background:linear-gradient(180deg,#FCEEF1 0%,var(--blush) 40%,#F2CBD5 100%);
    background-attachment:fixed;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

  .bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .heart{position:absolute;animation:float 7s ease-in-out infinite}
  .heart svg{display:block;filter:drop-shadow(0 8px 12px rgba(0,0,0,.06))}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-22px) rotate(4deg)}}
  .h1{top:6%;left:4%;width:60px;animation-delay:.2s}
  .h2{top:22%;right:5%;width:46px;animation-delay:1.4s}
  .h3{top:52%;left:5%;width:40px;animation-delay:.8s}
  .h4{top:74%;right:6%;width:54px;animation-delay:2s}
  .cloud-top{position:fixed;top:-2px;left:0;width:100%;z-index:0;pointer-events:none}

  .wrap{position:relative;z-index:2;max-width:540px;margin:0 auto;padding:40px 18px 60px}

  .selo{font-family:'Dancing Script',cursive;font-size:24px;color:var(--rosa-link);text-align:center;margin-bottom:4px}
  h1.hero{font-family:'Playfair Display',serif;font-weight:700;font-size:28px;line-height:1.2;text-align:center;margin-bottom:18px}

  .card{background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.9);border-radius:26px;
    padding:26px 24px;box-shadow:var(--sombra-sm);margin-bottom:20px}
  .abertura{background:linear-gradient(160deg,#fff,#FDF0F3)}
  .abertura p{font-size:16px;line-height:1.62;color:#5c5757;margin-top:10px}
  .abertura p:first-child{margin-top:0}

  .sec-label{text-align:center;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--rosa-link);font-weight:800;margin:6px 0 16px}

  /* faixa modular */
  .faixa{border-radius:24px;overflow:hidden;box-shadow:var(--sombra-sm);margin-bottom:20px;background:#fff}
  .faixa .capa{height:130px;display:flex;align-items:center;justify-content:center;gap:8px;
    font-weight:700;font-size:13px;color:#9a6b78;text-align:center;padding:0 20px}
  .faixa .corpo{padding:22px 24px}
  .faixa h3{font-family:'Playfair Display',serif;font-size:21px;font-weight:600;margin-bottom:12px}
  .faixa p{font-size:15.5px;line-height:1.62;color:#5c5757;margin-bottom:11px}
  .faixa p:last-child{margin-bottom:0}

  .virada{background:linear-gradient(160deg,#FDF0F3,#F7E4EA)}
  .virada p{font-size:16px;line-height:1.62;color:#514c4c;margin-top:10px}
  .virada p:first-child{margin-top:0}

  .juncao{font-family:'Playfair Display',serif;font-style:italic;font-size:18.5px;color:var(--grafite);
    text-align:center;line-height:1.55;margin:8px 10px 26px}

  /* CTA */
  .cta{background:linear-gradient(160deg,var(--verde),#40614c);border-radius:26px;padding:30px 26px;
    text-align:center;color:#fff;box-shadow:var(--sombra)}
  .cta .prod{font-family:'Dancing Script',cursive;font-size:26px;margin-bottom:2px;color:#ffdfe8}
  .cta h3{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;margin-bottom:12px}
  .cta p{font-size:15px;line-height:1.58;opacity:.94;margin-bottom:8px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;
    font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;padding:16px 26px;border-radius:100px;
    transition:.2s;text-decoration:none;width:100%;max-width:340px;margin:14px auto 0}
  .btn-rosa{background:linear-gradient(180deg,var(--rosa),var(--rosa-claro));color:#fff;box-shadow:0 12px 24px -10px rgba(238,141,168,.6)}
  .btn-rosa:hover{transform:translateY(-2px)}
  .btn-out{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.55)}
  .btn-out:hover{background:rgba(255,255,255,.12)}
  .cta .preco{font-size:13.5px;opacity:.85;margin-top:14px}
  .cta .ou{font-size:13px;opacity:.7;margin:14px 0 2px}

  .rodape{text-align:center;font-size:12px;color:#b98a97;margin-top:26px;line-height:1.6}
  .devnote{font-family:monospace;font-size:11px;color:#c99;background:rgba(255,255,255,.6);border-radius:8px;padding:5px 10px;display:inline-block;margin-top:8px}
  .fade{animation:fade .5s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<svg class="cloud-top" viewBox="0 0 1440 120" preserveAspectRatio="none"><path fill="#ffffff" fill-opacity="0.75" d="M0,60 C120,20 240,20 360,45 C480,70 560,10 700,35 C840,60 920,15 1060,40 C1200,65 1320,25 1440,55 L1440,0 L0,0 Z"/></svg>
<div class="bg-deco" id="deco"></div>

<div class="wrap" id="page"></div>

<script>
/* =========================================================================
   PÁGINA DE RESPOSTA MODULAR — Fluxo 2 (0-30 dias)
   Recebe a "receita" do quiz por URL e monta a página com as faixas prontas.
   Copy: QUIZ-AMAMENTACAO.md (Dayane). Faixas ainda em 1ª pessoa em alguns
   pontos (pendência: passada pra 3ª pessoa geral — regra 3, fazer com a Day).
   ========================================================================= */

const P = new URLSearchParams(location.search);
const cat    = P.get('cat')    || 'cat2';               // cat2 | cat3
const oferta = P.get('oferta') || 'guia';               // guia | guia_pesque | guia_acomp
const enfase = P.get('enfase') || '';
const faixas = (P.get('faixas')||'').split(',').filter(Boolean);

/* ---- copy ---- */
const ABERTURAS = {
  cat2:[
    "Você está no caminho certo, mas algumas coisas que você está vivendo não são normais. E elas estão te avisando de uma coisa importante: o bebê está com um pouco de dificuldade pra mamar.",
    "Não é nada sem solução, mas também não é pra deixar passar. Vou te mostrar, item por item, o que cada sinal que você marcou está querendo dizer."
  ],
  cat3:[
    "Sua amamentação está instável. A fórmula já ocupou mais espaço do que você gostaria. É possível reverter.",
    "Vou te explicar o que está acontecendo e o que você precisa fazer."
  ]
};
const ENFASE = {
  certeza:"Você queria ter certeza de que ele está mamando bem. Vamos olhar isso juntas.",
  produzir_leite:"Você sente que o leite está pouco. Olha o que está por trás disso.",
  parar_dor:"Você quer parar de sentir dor. Vou te mostrar de onde ela vem.",
  satisfeito:"Você quer que ele fique satisfeito por mais tempo. Bora entender.",
  seguranca:"Você quer se sentir mais segura e menos perdida. Vamos por partes."
};
const VIRADAS = {
  cat2:[
    "Repara numa coisa: tudo o que você marcou aponta pro mesmo lugar. O bebê está tendo que fazer força demais pra mamar.",
    "Cada um desses sinais é o corpinho dele avisando que a mamada está mais difícil do que deveria ser. E quando a gente facilita o jeito que o peito encaixa na boca dele, ele para de se esforçar e o resto melhora junto: a dor passa, o leite flui e ele fica satisfeito.",
    "É mais simples do que parece, e depende de um ajuste que você aprende em poucos minutos."
  ],
  cat3:[
    "Tudo o que você marcou conta a mesma história: o bebê está se esforçando demais pra mamar, e por isso a fórmula foi virando a saída necessária no dia a dia.",
    "Dá pra reverter, mas no seu caso o ajuste sozinho pode não bastar. Vale ter alguém olhando a sua situação de perto, te guiando passo a passo até o bebê voltar a mamar bem direto no peito.",
    "Você não precisa descobrir isso sozinha."
  ]
};
const JUNCAO = "Não espere pra ver no que vai dar. Resolva agora, enquanto a solução ainda está nas suas mãos e depende só de um ajuste.";

const FAIXAS = {
  pouco_leite:{ t:"A sensação de pouco leite", img:"ilustração: peito e produção de leite", p:[
    "A sensação de que o leite é pouco é uma das que mais assustam. Mas veja como o corpo funciona: quanto mais o bebê esvazia o peito, mais leite o corpo manda produzir. Quanto menos sai, mais a produção cai.",
    "Por isso, na maioria das vezes, o problema não é o corpo fazer pouco leite. É o bebê não estar conseguindo tirar todo o leite que já tem ali dentro.",
    "Dá pra aumentar a produção, sim. Mas o motor principal é o bebê mamando de forma efetiva e esvaziando o peito de verdade a cada mamada."
  ]},
  dor:{ t:"A dor pra amamentar", img:"ilustração: pega correta x pega rasa", p:[
    "Dor pra amamentar é tão comum que quase virou regra: ardeu, rachou, sangrou, e ainda te mandaram aguentar. Só que dor não é normal, e é um dos maiores motivos de mães largarem o peito antes da hora.",
    "E tem uma coisa que poucas percebem: se dói, é porque o bebê está pegando de um jeito que machuca. Então ele também está mamando com dificuldade.",
    "Quando esse jeito de pegar é ajustado, a mamada para de machucar, mesmo que o seio esteja sensível, rachado ou ferido. A pele cicatriza porque deixa de ser machucada a cada mamada."
  ]},
  empedrado:{ t:"O peito empedrado", img:"ilustração: peito ingurgitado", p:[
    "Peito empedrado, muito cheio e dolorido é leite preso que não está conseguindo sair direito. Pode até parecer fartura, mas é o contrário de tranquilo: pede atenção e ação rápida.",
    "Quando o leite fica acumulado, ele pode inflamar e virar uma mastite, que dá febre e muita dor, e em casos mais sérios até um abscesso.",
    "Quem melhor esvazia esse peito é o próprio bebê, desde que ele consiga mamar de forma efetiva. E é aí que ele precisa de uma mãozinha."
  ]},
  calo:{ t:"O calo no lábio", img:"foto/ilustração: calo (bolhinha) no lábio", p:[
    "Aquela bolhinha no lábio do bebê não aparece à toa. Ela surge quando ele precisa fazer muita força com a boca pra conseguir segurar o peito e mamar.",
    "Ou seja: ele está se esforçando bem mais do que deveria pra tirar o leite. Bebê que mama tranquilo fica de boca relaxada e não cria calo.",
    "Quando ele aprende a abocanhar de um jeito mais fácil, o lábio descansa e o calo sara sozinho."
  ]},
  pouca_fralda:{ t:"O xixi na fralda", img:"ilustração: fraldas do dia", p:[
    "O xixi é o sinal mais sincero de que o bebê está mamando o suficiente. Bebê bem alimentado faz bastante xixi, e isso aparece na fralda.",
    "Pra um recém-nascido, o esperado é molhar de 6 a 8 fraldas de xixi por dia. Abaixo disso é um aviso de que pode estar chegando menos leite do que ele precisa.",
    "É um dos primeiros sinais a virar: assim que ele passa a mamar melhor, a fralda responde rapidinho."
  ]},
  silicone:{ t:"O bico de silicone", img:"ilustração: bico de silicone", p:[
    "O bico de silicone quebra o galho na hora do aperto, e por isso muita mãe se apega a ele. Mas ele cobra um preço lá na frente.",
    "Pra tirar leite de verdade, o bebê precisa encostar a língua na aréola e fazer os movimentos certos de ordenha. O silicone entra no meio como uma barreira e não deixa ele fazer isso direito. Ele até mama, mas não do jeito mais efetivo, e a cada dia fica mais difícil largar.",
    "Largar o silicone tem hora certa e tem técnica, pra não voltar à estaca zero. Por isso, no seu caso, a indicação vem reforçada (te explico logo abaixo)."
  ]},
  raynaud:{ t:"O bico que fica branquinho", img:"ilustração: fenômeno de Raynaud", p:[
    "Se o bico fica branquinho e muito sensível ao frio logo depois de mamar, tem explicação: naquele momento o sangue não está circulando direito ali. Isso tem nome, é o fenômeno de Raynaud.",
    "Na amamentação, não é um problema do corpo da mãe. É a forte pressão que a boca do bebê faz no bico quando ele pega o peito de um jeito mais superficial.",
    "Quer dizer que os dois estão no sufoco: a mãe sente uma dor que arde e queima, e o bebê se cansa fazendo muita força pra pouco leite. Tirando esse aperto do bico, a circulação volta e a dor passa."
  ]},
  batom:{ t:"O bico em formato de batom", img:"foto/ilustração: bico achatado (batom)", p:[
    "Reparou que o bico sai meio achatado depois da mamada, parecido com uma ponta de batom? Isso acontece quando o bebê aperta o bico entre a língua e o céu da boca, quase como um alicate.",
    "Esse aperto machuca você e ainda cansa o bebê à toa. É embaixo da aréola que ficam os pontinhos cheios de leite, e do jeito que ele pega assim, ele alcança pouco e mama com dificuldade.",
    "Com um ajuste simples na hora de oferecer o peito, ele abocanha mais fundo, para de apertar o bico e mama muito mais fácil."
  ]},
  peso_abaixo:{ t:"O peso do bebê", img:"ilustração: curva de peso", p:[
    "Fique tranquila, é possível reverter este caso com o seu leite. Mesmo que já tenha começado a precisar de complemento, é possível reverter. Para isso é preciso entender o que está acontecendo, e o que está fazendo com que o bebê não extraia leite suficiente do seu peito, e estimular o que for preciso para o seu bebê começar a mamar de forma efetiva direto no peito.",
    "Às vezes o bebê pega no sono logo no início porque adormece antes de estar satisfeito, ou mama o tempo todo porque não está extraindo o leite como deveria."
  ]},
  peso_bom_dif:{ t:"O peso e as outras dificuldades", img:"ilustração: bebê no peito", p:[
    "Bom ganho de peso associado a outras dificuldades com relação à amamentação. Se o bebê está mamando bem, você pode achar que está tudo certo. Essas dificuldades podem interferir ou não no ganho de peso do bebê.",
    "O bebê que passa o dia no peito pode ganhar bom peso, às custas de muito esforço da mãe e do bebê, e não por uma amamentação efetiva que permita um dia tranquilo, com momentos para amamentação, lazer e descanso.",
    "Às vezes o bebê pega no sono logo no início porque adormece antes de estar satisfeito, ou mama o tempo todo porque não está extraindo o leite como deveria."
  ]}
};

/* cores alternadas das capas das faixas */
const CORES = ['var(--blush-claro)','#E7F2F7','#F3EAF7','#FDECE6'];

/* ---- CTAs ---- */
function ctaHTML(){
  if(oferta==='guia_pesque'){
    return `<div class="cta fade">
      <div class="prod">Guia da Pega + Pesque Baby</div>
      <h3>Pra largar o silicone com segurança</h3>
      <p>Você precisa de duas coisas juntas: aprender a facilitar a pega, com o Guia da Pega, e uma técnica certa pra fazer o bebê aceitar o peito direto, sem o silicone no meio. Essa técnica é o Pesque Baby, que eu criei justamente pra isso.</p>
      <p>Por isso, no seu caso, a indicação é o Guia da Pega junto com o Pesque Baby.</p>
      <a class="btn btn-rosa" href="#" data-checkout="guia_pesque">Quero tirar o bico de silicone</a>
      <div class="preco">Guia da Pega + Pesque Baby</div>
    </div>`;
  }
  if(oferta==='guia_acomp'){
    return `<div class="cta fade">
      <div class="prod">Guia da Pega</div>
      <h3>Um ajuste na pega, com apoio de perto</h3>
      <p>No Guia da Pega você aprende, de um jeito simples, como facilitar pro bebê pegar o peito e mamar de forma efetiva.</p>
      <p>E no seu caso, vale ter alguém de perto pra te orientar e tirar todas as dúvidas na hora: você pode acrescentar 30 dias de acompanhamento individual com a nossa consultora, direto no seu WhatsApp.</p>
      <a class="btn btn-rosa" href="#" data-checkout="guia_acomp">Guia da Pega + acompanhamento</a>
      <div class="ou">ou</div>
      <a class="btn btn-out" href="#" data-checkout="guia">Só o Guia da Pega</a>
      <div class="preco">Guia da Pega R$67 · Acompanhamento +R$97</div>
    </div>`;
  }
  // guia
  return `<div class="cta fade">
    <div class="prod">Guia da Pega</div>
    <h3>Deixa a mamada mais fácil pro seu bebê</h3>
    <p>No Guia da Pega você aprende, de um jeito simples, como facilitar pro bebê pegar o peito e mamar de forma efetiva. São poucos minutos pra entender e já colocar em prática na próxima mamada.</p>
    <a class="btn btn-rosa" href="#" data-checkout="guia">Quero ajudar meu bebê a mamar melhor</a>
    <div class="preco">Guia da Pega · R$67</div>
  </div>`;
}

/* ---- render ---- */
function paras(arr){ return arr.map(t=>`<p>${t}</p>`).join(''); }

function render(){
  let html = `<div class="selo fade">Olha só o que descobri…</div>
    <h1 class="hero fade">Seu resultado</h1>`;

  // ênfase (P9) como abertura tailored
  if(ENFASE[enfase]) html += `<p class="juncao fade" style="font-style:normal;font-family:'Nunito';font-weight:700;color:#6f6a6a;font-size:16px;margin-top:0">${ENFASE[enfase]}</p>`;

  // abertura
  html += `<div class="card abertura fade">${paras(ABERTURAS[cat]||ABERTURAS.cat2)}</div>`;

  // faixas
  if(faixas.length){
    html += `<div class="sec-label fade">o que cada sinal quer dizer</div>`;
    faixas.forEach((id,i)=>{
      const f = FAIXAS[id]; if(!f) return;
      html += `<div class="faixa fade">
        <div class="capa" style="background:${CORES[i%CORES.length]}">🖼️ ${f.img}</div>
        <div class="corpo"><h3>${f.t}</h3>${paras(f.p)}</div>
      </div>`;
    });
  }

  // virada
  html += `<div class="card virada fade">${paras(VIRADAS[cat]||VIRADAS.cat2)}</div>`;

  // frase de junção
  html += `<p class="juncao fade">${JUNCAO}</p>`;

  // CTA
  html += ctaHTML();

  // rodapé
  html += `<p class="rodape fade">Feito com carinho pela Day 💚<br>
    <span class="devnote">cat=${cat} · oferta=${oferta} · faixas=${faixas.join(', ')||'—'}</span></p>`;

  document.getElementById('page').innerHTML = html;

  // checkout placeholder (Greenn real entra depois)
  document.querySelectorAll('[data-checkout]').forEach(a=>a.addEventListener('click',e=>{
    e.preventDefault();
    alert('Checkout da Greenn entra aqui (produto: '+a.dataset.checkout+').');
  }));
}

/* corações decorativos */
const hearts=[['h1','#F7B7C6'],['h2','#BFE1EC'],['h3','#F5A38C'],['h4','#F7B7C6']];
document.getElementById('deco').innerHTML = hearts.map(([c,col])=>
  `<div class="heart ${c}"><svg viewBox="0 0 32 29" width="100%"><path fill="${col}" d="M16 29S2 20 2 10.5C2 5 6 2 9.5 2 13 2 16 5 16 5s3-3 6.5-3C26 2 30 5 30 10.5 30 20 16 29 16 29z"/></svg></div>`
).join('');

render();
</script>
</body>
</html>

    {id:'p4', type:'multi', text:'O que você mais quer aprender antes do bebê chegar?', hint:'Pode marcar mais de uma', options:[
      {v:'pega_nao_doer', ic:'🎯', label:'Como fazer a pega certa pra não doer'},
      {v:'garantir_leite', ic:'🥛', label:'Como garantir que vou ter leite'},
      {v:'saber_suficiente', ic:'📏', label:'Como saber se ele está mamando o suficiente'},
      {v:'cuidar_rn', ic:'👶', label:'Como cuidar do recém-nascido sem entrar em pânico'},
    ]},
  ],
};

/* ============================ ROTEAMENTO ================================ */

/* Fluxo 2: "bebê está bem?" (base pra Categoria 1 quando é só peito) */
function bebeBemRN(a){
  const p3bom = has(a.p3,'solta_satisfeito') && !any(a.p3,['dorme_rapido','horas_peito','larga_quer','briga']);
  const fraldaOk = a.p4==='f6_8' || a.p4==='mais8';
  const pesoOk = a.p5==='bem' || a.p5==='super_bem';
  const seioOk = !any(a.p6,['doendo','rachadura','sangrando','empedrados','raynaud','silicone','sensiveis']);
  return p3bom && fraldaOk && pesoOk && seioOk && a.p7!=='sim' && a.p8!=='sim';
}
/* Fluxo 2: categoria (1 = bebê bem/sono, 2 = média, 3 = alta) */
function categoriaRN(a){
  if(a.p2==='peito_formula'){
    return (a.p2b==='f5_8' || a.p2b==='f8_10') ? 'cat3' : 'cat2';
  }
  if(a.p2==='so_formula'){
    return a.p2c==='sim' ? 'cat3' : 'cat1';   // não quer voltar -> caminho sono
  }
  // só peito
  return bebeBemRN(a) ? 'cat1' : 'cat2';
}

/* Mapa de desfechos -> rótulo + caminho (oferta). O texto completo mora no site de resposta. */
const DESFECHOS = {
  // Fluxo 2
  rn_formula_sono:   {emoji:'💚', titulo:'Seu bebê está bem alimentado', caminho:'Sono do bebê', oferta:'Dream Baby'},
  rn_cat1_dormebem:  {emoji:'🎉', titulo:'Mama e dorme muito bem!', caminho:'Estímulo ao desenvolvimento', oferta:'Entre Sonecas'},
  rn_cat1_sono:      {emoji:'🌙', titulo:'A amamentação vai bem, o ponto é o sono', caminho:'Sono do bebê', oferta:'Dream Baby'},
  rn_cat2_guia:      {emoji:'🤱', titulo:'Dá pra deixar a mamada bem mais fácil', caminho:'Ajuste da pega', oferta:'Guia da Pega'},
  rn_cat2_silicone:  {emoji:'🛡️', titulo:'Vamos tirar o silicone com segurança', caminho:'Ajuste da pega', oferta:'Guia da Pega + Pesque Baby'},
  rn_cat3_acomp:     {emoji:'🤝', titulo:'Vale uma mão mais próxima pra reverter', caminho:'Ajuste + acompanhamento', oferta:'Guia da Pega + Acompanhamento'},
  // Fluxo 3
  m_guia_acomp:      {emoji:'🤝', titulo:'Dá pra voltar ao peito com apoio de perto', caminho:'Ajuste + acompanhamento', oferta:'Guia da Pega + Acompanhamento'},
  m_guia:            {emoji:'🤱', titulo:'Um ajuste resolve o que está te incomodando', caminho:'Ajuste da pega', oferta:'Guia da Pega'},
  m_guia_pesque:     {emoji:'🛡️', titulo:'Vamos tirar o silicone com segurança', caminho:'Ajuste da pega', oferta:'Guia da Pega + Pesque Baby'},
  m_sono:            {emoji:'🌙', titulo:'É sono, não amamentação', caminho:'Sono do bebê', oferta:'Dream Baby'},
  m_tudo_bem:        {emoji:'🎉', titulo:'Está tudo indo muito bem!', caminho:'Estímulo ao desenvolvimento', oferta:'Entre Sonecas'},
  // Fluxo 4
  m6_tudo_dez:       {emoji:'🎉', titulo:'Está tudo perfeitinho!', caminho:'Parabéns, sem oferta', oferta:'—'},
  m6_intro:          {emoji:'🍽️', titulo:'É a fase da introdução, fica tranquila', caminho:'Orientação', oferta:'—'},
  m6_cruzamento:     {emoji:'🥛', titulo:'Vamos repor o leite do dia', caminho:'Ajuste + sono se persistir', oferta:'Dream Baby'},
  m6_sono:           {emoji:'🌙', titulo:'É sono, não amamentação', caminho:'Sono do bebê', oferta:'Dream Baby'},
  // Fluxo 1
  g_guia:            {emoji:'💚', titulo:'Você vai chegar preparada', caminho:'Preparação pra amamentar', oferta:'Guia da Pega'},
  g_guia_calminho:   {emoji:'💚', titulo:'Preparada pra amamentar e pros primeiros dias', caminho:'Preparação', oferta:'Guia da Pega + Bebê Calminho'},
};

function roteia(flow, a){
  if(flow==='rn'){
    const cat = categoriaRN(a);
    if(cat==='cat3') return 'rn_cat3_acomp';
    if(cat==='cat2') return has(a.p6,'silicone') ? 'rn_cat2_silicone' : 'rn_cat2_guia';
    // cat1
    if(a.p2==='so_formula') return 'rn_formula_sono';
    return a.p10==='dorme_bem' ? 'rn_cat1_dormebem' : 'rn_cat1_sono';
  }
  if(flow==='m1a5'){
    if(a.p2c==='sim') return 'm_guia_acomp';
    if(a.p2b==='f5_8' || a.p2b==='f8_10') return 'm_guia_acomp';
    if(a.p8b==='sim') return 'm_guia_pesque';
    const baixoPeso = a.p7==='pouco_abaixo' || a.p7==='bem_abaixo';
    const queixaProd = any(a.p6,['producao','nao_sei_suficiente']);
    const media = a.p2b==='f1_2' || a.p2b==='f3_5';
    const soPeitoSintoma = a.p2==='so_peito' && any(a.p3,['dorme_peito','muito_tempo','briga_recusa']);
    if(baixoPeso || queixaProd || media || soPeitoSintoma) return 'm_guia';
    const sono = a.p4==='cada_2h' || any(a.p5,['golinho','so_colo']) || any(a.p6,['acorda_noite','so_dorme_peito','organizar']);
    if(sono) return 'm_sono';
    return 'm_tudo_bem';
  }
  if(flow==='m6a12'){
    const pesoBom = a.p7==='bem' || a.p7==='super_bem';
    const introOk = a.p3==='bem' || a.p3==='nao_comecei';
    const introDif = a.p3==='aceita_pouco' || a.p3==='recusa';
    const dormeBem = a.p4==='nao' && !any(a.p5,['golinhos','so_colo']);
    const leiteBaixoDia = a.p8==='uma_duas' || a.p8==='nao_oferece_dia';
    const acordaNoite = a.p4==='algumas' || a.p4==='cada_2h';
    const sinaisSono = a.p4==='cada_2h' || any(a.p5,['golinhos','so_colo']);
    if(pesoBom && introOk && dormeBem) return 'm6_tudo_dez';
    if(pesoBom && introDif && dormeBem) return 'm6_intro';
    if(leiteBaixoDia && acordaNoite) return 'm6_cruzamento';
    if(sinaisSono) return 'm6_sono';
    return 'm6_intro';
  }
  if(flow==='gestante'){
    return has(a.p4,'cuidar_rn') ? 'g_guia_calminho' : 'g_guia';
  }
}

/* ============================ ENGINE ==================================== */
let state = { flow:null, answers:{}, order:[], pos:0 };

function startQuiz(){
  state = { flow:null, answers:{}, order:['__idade__'], pos:0 };
  document.getElementById('welcome').style.display='none';
  document.getElementById('quiz').style.display='block';
  render();
}

/* perguntas visíveis do fluxo atual (respeita showIf) */
function visibleQuestions(){
  if(!state.flow) return [];
  return FLOWS[state.flow].filter(q => !q.showIf || q.showIf(state.answers));
}

/* pergunta atual (idade é especial) */
function currentQ(){
  if(state.order[state.pos]==='__idade__') return IDADE;
  const vis = visibleQuestions();
  return vis[state.pos - 1]; // pos 0 = idade; 1.. = perguntas do fluxo
}

function progressInfo(){
  if(state.order[state.pos]==='__idade__') return {pct:6, txt:'1 de ?'};
  const vis = visibleQuestions();
  const total = vis.length + 1;
  const step = state.pos + 1;
  return {pct: Math.round((state.pos/total)*100)+6, txt:`${step} de ${total}`};
}

function render(){
  const q = currentQ();
  if(!q){ renderEnd(); return; }
  const p = progressInfo();
  const el = document.getElementById('quiz');
  let opts='';

  if(q.type==='single'){
    const cur = state.answers[q.id];
    opts = `<div class="options">` + q.options.map(o=>`
      <div class="opt ${cur===o.v?'sel':''}" onclick="pickSingle('${q.id}','${o.v}')">
        <div class="ic">${o.ic||'•'}</div>${o.label}<div class="chk"></div>
      </div>`).join('') + `</div>`;
  }
  else if(q.type==='multi'){
    const cur = state.answers[q.id]||[];
    opts = `<div class="options">` + q.options.map(o=>`
      <div class="opt ${cur.includes(o.v)?'sel':''}" onclick="toggleMulti('${q.id}','${o.v}',${q.max||0})">
        <div class="ic">${o.ic||'•'}</div>${o.label}<div class="chk"></div>
      </div>`).join('') + `</div>
      <div class="btn-row"><button id="contBtn" class="btn btn-verde" onclick="goNext()">Continuar</button></div>`;
  }
  else if(q.type==='foto'){
    const cur = state.answers[q.id];
    opts = `<div class="foto-ref">🖼️ ${q.foto}</div>
      <div class="foto-row">
        <div class="opt ${cur==='sim'?'sel':''}" onclick="pickSingle('${q.id}','sim')"><div class="ic">👀</div>Sim<div class="chk"></div></div>
        <div class="opt ${cur==='nao'?'sel':''}" onclick="pickSingle('${q.id}','nao')"><div class="ic">🙂</div>Não<div class="chk"></div></div>
      </div>`;
  }

  el.innerHTML = `
    <div class="screen">
      <div class="progress"><div class="bar"><div class="fill" style="width:${p.pct}%"></div></div><div class="step">${p.txt}</div></div>
      <h2 class="q">${q.text}</h2>
      ${q.hint?`<p class="q-hint">${q.hint}</p>`:`<div style="height:6px"></div>`}
      ${opts}
      <div class="btn-row"><button class="btn btn-ghost" onclick="goBack()">← voltar</button></div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function pickSingle(qid, v){
  state.answers[qid]=v;
  // idade define o fluxo
  if(qid==='idade'){ state.flow=v; }
  goNext();
}

function toggleMulti(qid, v, max){
  const arr = state.answers[qid] ? [...state.answers[qid]] : [];
  const i = arr.indexOf(v);
  if(i>=0) arr.splice(i,1);
  else { if(max && arr.length>=max) return; arr.push(v); }
  state.answers[qid]=arr;
  // atualiza visual sem re-render completo
  render();
}

function goNext(){
  state.pos++;
  render();
}

function goBack(){
  if(state.pos===0){ // volta pra abertura
    document.getElementById('quiz').style.display='none';
    document.getElementById('welcome').style.display='block';
    return;
  }
  state.pos--;
  render();
}

function renderEnd(){
  const bucket = roteia(state.flow, state.answers);
  const d = DESFECHOS[bucket] || {emoji:'💚', titulo:'Prontinho!', caminho:'—', oferta:'—'};
  // guarda pra plugar o redirect futuro
  window.__quizResult = { flow:state.flow, bucket, answers:state.answers };
  const el = document.getElementById('quiz');
  el.innerHTML = `
    <div class="screen">
      <div class="end-emoji">${d.emoji}</div>
      <h1 class="title" style="font-size:24px">${d.titulo}</h1>
      <p class="lead">Terminamos! Com base nas suas respostas, esse é o caminho que faz mais sentido pra vocês agora.</p>
      <div class="caminho">
        <div class="lbl">Caminho recomendado</div>
        <div class="nome">${d.oferta}</div>
      </div>
      <p class="devnote">A página de resposta completa (com a explicação de cada sinal) entra aqui em seguida, como site à parte.
        <br><span class="devbucket">desfecho: ${bucket}</span></p>
      <div class="btn-row"><button class="btn btn-ghost" onclick="startQuiz()">↻ refazer o quiz</button></div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}
